{% from "components/alerts.html" import flash_messages %}
{% from "components/layout.html" import main_navbar %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or "NeriSoft Sistema" }} - NeriSoft Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/nerisoft_typography.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/nerisoft_alerts.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/fecha_argentina_datepicker.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/nerisoft_select.css') }}" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('favicon') }}">
</head>
<body>
    {{ main_navbar("NeriSoft Sistema") }}

    <main class="container py-4">
        {{ flash_messages() }}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/nerisoft_alerts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/fecha_argentina_datepicker.js') }}"></script>
    <script src="{{ url_for('static', filename='js/numero_argentino.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nerisoft_select.js') }}"></script>
</body>
</html>
