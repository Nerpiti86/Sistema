{% macro text_input(name, label, value="", type="text", required=false) %}
<div class="mb-3">
    <label for="{{ name }}" class="form-label">{{ label }}</label>
    <input
        type="{{ type }}"
        class="form-control"
        id="{{ name }}"
        name="{{ name }}"
        value="{{ value }}"
        {% if required %}required{% endif %}
    >
</div>
{% endmacro %}
